<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Compras Inteligentes</title>
<style>
    :root {
        --cor-principal: #4B0082;
        --verde-florescente: #00FF00;
        --verde-escuro-fundo: #002200;
        --azul-vivo-escuro: #003366; 
        --vermelho-lindo: #FF0000; 
        --laranja-forte: #f77f00;
    }

    body { 
        font-family: 'Arial Black', Gadget, sans-serif; 
        margin: 0; 
        background-color: var(--azul-vivo-escuro); 
        display: flex; flex-direction: column; align-items: center;
        min-height: 100vh;
    }

    .container { 
        max-width: 450px; 
        width: 100%; 
        min-height: 100vh; 
        box-shadow: 0 0 30px rgba(0,0,0,0.8); 
        display: flex;
        flex-direction: column;
        background-color: var(--azul-vivo-escuro); 
    }

    .tela { display: none; padding: 15px; flex-grow: 1; }
    .ativa { display: flex; flex-direction: column; }

    /* --- TELA DE SELEÇÃO --- */
    #tela-selecao { background-color: var(--azul-vivo-escuro); }

    .titulo-lista {
        text-align: center; 
        color: white; 
        font-size: 34px; 
        margin-top: 10px; 
        margin-bottom: 0px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .subtitulo {
        text-align: center;
        color: white;
        font-size: 18px;
        margin-bottom: 10px;
        font-weight: bold;
        letter-spacing: 2px;
    }

    .produtos-grid {
        display: grid; grid-template-columns: repeat(2, 1fr);
        gap: 12px; margin-top: 15px;
    }

    .produto-card {
        text-align: center; cursor: pointer; 
        border: 2px solid white; 
        border-radius: 12px; padding: 20px 10px; 
        background-color: #002244; 
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 0px rgba(0,0,0,0.4);
        min-height: 65px;
        transition: all 0.2s;
    }

    .produto-card.selecionado {
        background-color: var(--vermelho-lindo) !important;
    }
    
    .produto-card span { 
        font-size: 16px; 
        color: white; 
        font-weight: 900; 
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-finalizar-lista {
        background: var(--vermelho-lindo); 
        color: white; 
        border: 3px solid white; 
        width: 100%;
        padding: 25px; 
        font-size: 24px; 
        font-weight: bold; 
        border-radius: 15px;
        margin-top: 25px; 
        cursor: pointer; 
        box-shadow: 0 6px #990000;
        text-transform: uppercase;
        margin-bottom: 15px;
    }

    /* --- TELA DA CALCULADORA --- */
    #tela-calculadora { background-color: #f0f0f0; }

    .item-atual-box {
        background: #fff3cd; padding: 20px; border-radius: 12px;
        text-align: center; font-size: 30px; color: #000;
        margin-bottom: 15px; border: 4px solid #fbc02d;
        text-transform: uppercase;
    }

    .display {
        background: linear-gradient(135deg, #003300, var(--verde-escuro-fundo));
        padding: 25px; border-radius: 15px; margin-bottom: 20px;
        border: 5px solid #333;
    }

    .display-valor {
        color: var(--verde-florescente); font-size: 60px;
        text-align: center; font-family: 'Courier New', monospace; font-weight: bold;
    }

    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    
    .numpad button {
        padding: 25px 10px; font-size: 38px; border: none;
        border-radius: 15px; background: #222; cursor: pointer;
        color: #fff; font-weight: 900;
        box-shadow: 0 6px #000;
    }

    .btn-apagar { background: var(--laranja-forte) !important; box-shadow: 0 6px #a65600 !important; }
    .btn-limpar { background: var(--vermelho-lindo) !important; box-shadow: 0 6px #990000 !important; }

    .btn-confirmar {
        background: #007bff; color: white; padding: 25px;
        width: 100%; border: none; border-radius: 15px;
        font-size: 24px; font-weight: bold; margin-top: 25px;
        box-shadow: 0 6px #004494;
    }

    #total-box {
        background: var(--cor-principal); color: white;
        padding: 25px; text-align: center; font-size: 35px; 
        margin-top: 20px; border-radius: 15px; border: 4px solid #310055;
        margin-bottom: 15px;
    }
</style>
</head>
<body>

<div class="container">
    
    <div id="tela-selecao" class="tela ativa">
        <h2 class="titulo-lista">MINHA LISTA</h2>
        <div class="subtitulo">SUPER MERCADO</div>
        <div style="text-align: center; margin-bottom: 15px;">
            <span id="qtd-itens" style="background:red; color:white; padding:8px 25px; border-radius:30px; font-size: 20px; font-weight: bold; border: 2px solid white;">0 ITENS</span>
        </div>
        <div class="produtos-grid" id="galeria"></div>
        <button class="btn-finalizar-lista" onclick="irParaCalculadora()">FINALIZAR LISTA ✓</button>
    </div>

    <div id="tela-calculadora" class="tela">
        <div class="item-atual-box" id="caixa-item">
            <span id="nome-item-fila">---</span>
        </div>

        <div class="display">
            <div class="display-valor" id="display">R$ 0,00</div>
        </div>

        <div class="numpad">
            <button onclick="digitar('1')">1</button>
            <button onclick="digitar('2')">2</button>
            <button onclick="digitar('3')">3</button>
            <button onclick="digitar('4')">4</button>
            <button onclick="digitar('5')">5</button>
            <button onclick="digitar('6')">6</button>
            <button onclick="digitar('7')">7</button>
            <button onclick="digitar('8')">8</button>
            <button onclick="digitar('9')">9</button>
            <button onclick="limparDigitacao()" class="btn-limpar">C</button>
            <button onclick="digitar('0')">0</button>
            <button onclick="apagarUltimo()" class="btn-apagar">⌫</button>
        </div>

        <button class="btn-confirmar" onclick="confirmarPreco()">ADICIONAR AO TOTAL</button>
        <div id="total-box">TOTAL: R$ 0,00</div>
    </div>

</div>

<script>
    const listaProdutos = [
        "Açúcar", "Arroz", "Feijão", "Sal", "Macarrão", "Miojo", 
        "Café", "Leite", "Pão", "Manteiga", "Queijo", "Presunto",
        "Mortadela", "Salsicha", "Hambúrguer", "Nuggets", "Pizza",
        "Ovos", "Óleo", "Azeite", "Farinha Trigo", "Milho", "Ervilha",
        "Maionese", "Ketchup", "Extrato Tomate", "Biscoito", "Bolo", 
        "Gelatina", "Danone", "Iogurte", "Achocolatado",
        "Refrigerante", "Suco", "Cerveja", "Água", "Vinho",
        "Detergente", "Sabão em pó", "Amaciante", "Desinfetante", "Esponja",
        "Papel Higiênico", "Papel Toalha", "Creme Dental", "Shampoo", "Sabonete",
        "Desodorante", "Algodão", "Bombril", "Perfex",
        "Goiabada", "Bombom", "Carne", "Calabresa", "Batata Pronta",
        "Peito de Frango", "Carne Moída", "Frango", "Saco de Lixo", "Farofa", "Farinha de Mesa"
    ];

    let listaDeCompras = [];
    let valorDigitado = '';
    let totalAcumulado = 0;

    const galeria = document.getElementById('galeria');
    
    listaProdutos.forEach((produto) => {
        const div = document.createElement('div');
        div.className = 'produto-card';
        div.innerHTML = `<span>${produto}</span>`;
        div.onclick = function() {
            this.classList.add('selecionado');
            listaDeCompras.push(produto);
            document.getElementById('qtd-itens').innerText = listaDeCompras.length + " ITENS";
            falar(produto);
        };
        galeria.appendChild(div);
    });

    function falar(texto) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = texto;
            msg.lang = 'pt-BR';
            const voices = window.speechSynthesis.getVoices();
            const voz = voices.find(v => (v.name.includes('Google') || v.name.includes('female')) && v.lang === 'pt-BR');
            if (voz) msg.voice = voz;
            window.speechSynthesis.speak(msg);
        }
    }

    function irParaCalculadora() {
        if (listaDeCompras.length === 0) return;
        document.getElementById('tela-selecao').classList.remove('ativa');
        document.getElementById('tela-calculadora').classList.add('ativa');
        proximoItem();
    }

    function proximoItem() {
        if (listaDeCompras.length > 0) {
            const proximo = listaDeCompras[0];
            document.getElementById('nome-item-fila').innerText = proximo;
            falar(proximo); 
        } else {
            document.getElementById('nome-item-fila').innerText = "CONCLUÍDO";
            falar("compras concluídas");
        }
    }

    function digitar(n) {
        if (valorDigitado.length >= 6) return;
        valorDigitado += n;
        atualizarDisplay();
    }

    function atualizarDisplay() {
        let valor = valorDigitado || '0';
        let reais = parseInt(valor) / 100;
        document.getElementById('display').textContent = 'R$ ' + reais.toFixed(2).replace('.', ',');
    }

    function apagarUltimo() {
        valorDigitado = valorDigitado.slice(0, -1);
        atualizarDisplay();
    }

    function limparDigitacao() {
        valorDigitado = '';
        atualizarDisplay();
    }

    function confirmarPreco() {
        if (!valorDigitado || listaDeCompras.length === 0) return;
        totalAcumulado += (parseInt(valorDigitado) / 100);
        document.getElementById('total-box').textContent = 'TOTAL: R$ ' + totalAcumulado.toFixed(2).replace('.', ',');
        listaDeCompras.shift();
        valorDigitado = '';
        atualizarDisplay();
        proximoItem();
    }

    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>

</body>
</html>
