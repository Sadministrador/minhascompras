<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Compras – Mercado Fácil</title>

<style>
:root {
    --cor-principal: #4B0082;
    --cor-adicionar: #007bff;
    --cor-adicionar-hover: #0056b3;
    --verde-florescente: #00FF00;
    --verde-escuro-fundo: #003300;
    --vermelho-forte: #8B0000;
    --vermelho-gradiente: #CC0000;
}

* { box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #764ba2 0%, var(--cor-principal) 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    max-width: 500px;
    width: 100%;
    padding: 15px;
}

/* ---------- APP ---------- */
#calculator-content {
    max-width: 400px;
    margin: auto;
    width: 100%;
}

.header {
    background: white;
    padding: 20px;
    text-align: center;
    border-radius: 20px 20px 0 0;
}

.header h1 {
    margin: 0;
    color: var(--cor-principal);
    font-size: 24px;
}

.main-section {
    background: white;
    padding: 20px;
}

.display {
    background: linear-gradient(135deg, #004d00, var(--verde-escuro-fundo));
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.display-label {
    color: var(--verde-florescente);
    text-align: center;
    font-size: 12px;
}

.display-valor {
    color: var(--verde-florescente);
    font-size: 54px;
    font-weight: bold;
    text-align: center;
    font-family: monospace;
}

.numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.numpad button {
    padding: 20px;
    font-size: 32px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #f9f9f9;
    cursor: pointer;
    transition: background 0.2s;
}

.numpad button:active {
    background: #e0e0e0;
}

.btn-limpar {
    margin-top: 15px;
    background: linear-gradient(135deg, var(--vermelho-gradiente), var(--vermelho-forte));
    color: white;
    padding: 15px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    width: 100%;
    cursor: pointer;
}

.btn-adicionar {
    margin-top: 15px;
    background: linear-gradient(135deg, var(--cor-adicionar), var(--cor-adicionar-hover));
    color: white;
    padding: 20px;
    font-size: 24px;
    border-radius: 12px;
    border: none;
    width: 100%;
    cursor: pointer;
}

#total {
    background: linear-gradient(135deg, #764ba2, var(--cor-principal));
    color: white;
    padding: 25px;
    font-size: 32px;
    text-align: center;
}

.lista-section {
    background: white;
    padding: 20px;
    border-radius: 0 0 20px 20px;
    max-height: 200px;
    overflow-y: auto;
}
</style>
</head>

<body>
<div class="container">

    <div id="calculator-content">
        <div class="header">
            <h1>🛒 Calculadora de Compras</h1>
        </div>

        <div class="main-section">
            <div class="display">
                <div class="display-label">VALOR DIGITADO</div>
                <div class="display-valor" id="display">R$ 0,00</div>
            </div>

            <div class="numpad">
                <button onclick="digitar('1')">1</button>
                <button onclick="digitar('2')">2</button>
                <button onclick="digitar('3')">3</button>
                <button onclick="digitar('4')">4</button>
                <button onclick="digitar('5')">5</button>
                <button onclick="digitar('6')">6</button>
                <button onclick="digitar('7')">7</button>
                <button onclick="digitar('8')">8</button>
                <button onclick="digitar('9')">9</button>
                <button onclick="digitar('00')">00</button>
                <button onclick="digitar('0')">0</button>
                <button onclick="apagarUltimo()">⌫</button>
            </div>

            <button class="btn-limpar" onclick="limparTudo()">🗑️ LIMPAR TUDO</button>
            <button class="btn-adicionar" onclick="adicionarPreco()">✓ ADICIONAR</button>
        </div>

        <div id="total">TOTAL: R$ 0,00</div>
        <div class="lista-section">
            <h3>🛍️ Carrinho (<span id="count">0</span>)</h3>
            <div id="lista"></div>
        </div>
    </div>
</div>

<script>
let valorAtual = "", total = 0, itens = [];

function digitar(n) {
    valorAtual += n;
    atualizar();
}

function apagarUltimo() {
    valorAtual = valorAtual.slice(0, -1);
    atualizar();
}

function atualizar() {
    let num = parseFloat(valorAtual || 0) / 100;
    document.getElementById("display").innerText = "R$ " + num.toLocaleString('pt-BR', {minimumFractionDigits: 2});
}

function adicionarPreco() {
    if (!valorAtual || valorAtual === "0" || valorAtual === "00") return;
    
    let p = parseInt(valorAtual) / 100;
    total += p;
    itens.push(p);
    
    // Atualiza a lista visual (opcional)
    const listaDiv = document.getElementById("lista");
    const itemNovo = document.createElement("div");
    itemNovo.innerText = `Item ${itens.length}: R$ ${p.toFixed(2).replace(".", ",")}`;
    listaDiv.appendChild(itemNovo);

    valorAtual = "";
    atualizar();
    
    document.getElementById("total").innerText = "TOTAL: R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    document.getElementById("count").innerText = itens.length;
}

function limparTudo() {
    valorAtual = "";
    total = 0;
    itens = [];
    atualizar();
    document.getElementById("total").innerText = "TOTAL: R$ 0,00";
    document.getElementById("count").innerText = 0;
    document.getElementById("lista").innerHTML = "";
}
</script>

</body>
</html>
