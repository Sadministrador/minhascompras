<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Compras Offline</title>

<style>
:root {
    --cor-principal: #4B0082;
    --cor-adicionar: #007bff;
    --cor-adicionar-hover: #0056b3;
    --verde-florescente: #00FF00;
    --verde-escuro-fundo: #003300;
    --vermelho-forte: #8B0000;
    --vermelho-gradiente: #CC0000;
}

* { box-sizing: border-box; }

body { 
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #764ba2 0%, var(--cor-principal) 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    max-width: 400px;
    width: 100%;
    padding: 15px;
}

.header {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    text-align: center;
}

h1 { 
    color: var(--cor-principal);
    margin: 0;
    font-size: 28px;
}

.main-section {
    background: white;
    padding: 20px;
}

.display {
    background: linear-gradient(135deg, #004d00 0%, var(--verde-escuro-fundo) 100%);
    padding: 20px 15px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.display-label {
    color: var(--verde-florescente);
    font-size: 14px;
    text-align: center;
}

.display-valor {
    color: var(--verde-florescente);
    font-size: 54px;
    font-weight: bold;
    text-align: center;
    font-family: 'Courier New', monospace;
}

.numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.numpad button {
    padding: 20px;
    font-size: 32px;
    border: none;
    border-radius: 12px;
    background: #ecf0f1;
    cursor: pointer;
}

.actions {
    margin-top: 15px;
}

.btn-limpar {
    background: linear-gradient(135deg, var(--vermelho-gradiente), var(--vermelho-forte));
    color: white;
    padding: 15px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    width: 100%;
    cursor: pointer;
}

.btn-adicionar {
    background: linear-gradient(135deg, var(--cor-adicionar), var(--cor-adicionar-hover));
    color: white;
    padding: 20px;
    font-size: 24px;
    border: none;
    border-radius: 12px;
    width: 100%;
    margin-top: 15px;
    cursor: pointer;
}

#total {
    font-size: 38px;
    font-weight: bold;
    background: linear-gradient(135deg, #764ba2, var(--cor-principal));
    color: white;
    padding: 25px;
    text-align: center;
}

.lista-section {
    background: white;
    border-radius: 0 0 20px 20px;
    padding: 20px;
}
</style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>🛒 Minhas Compras</h1>
    </div>

    <div class="main-section">

        <div class="display">
            <div class="display-label">VALOR DIGITADO</div>
            <div class="display-valor" id="display">R$ 0,00</div>
        </div>

        <div class="numpad">
            <button onclick="digitar('1')">1</button>
            <button onclick="digitar('2')">2</button>
            <button onclick="digitar('3')">3</button>
            <button onclick="digitar('4')">4</button>
            <button onclick="digitar('5')">5</button>
            <button onclick="digitar('6')">6</button>
            <button onclick="digitar('7')">7</button>
            <button onclick="digitar('8')">8</button>
            <button onclick="digitar('9')">9</button>
            <button onclick="digitar('00')">00</button>
            <button onclick="digitar('0')">0</button>
            <button onclick="apagarUltimo()">⌫</button>
        </div>

        <div class="actions">
            <button class="btn-limpar" onclick="limparTudo()">🗑️ LIMPAR TUDO</button>
            <button class="btn-adicionar" onclick="adicionarPreco()">✓ ADICIONAR AO CARRINHO</button>
        </div>

    </div>

    <div id="total">TOTAL: R$ 0,00</div>

    <div class="lista-section">
        <strong>🛍️ Itens no carrinho: <span id="count">0</span></strong>
    </div>

</div>

<script>
let valorAtual = '';
let total = 0;
let itens = 0;

function digitar(n) {
    if (valorAtual.length >= 6) return;
    valorAtual += n;
    atualizarDisplay();
}

function apagarUltimo() {
    valorAtual = valorAtual.slice(0, -1);
    atualizarDisplay();
}

function atualizarDisplay() {
    if (!valorAtual) {
        document.getElementById('display').textContent = 'R$ 0,00';
        return;
    }
    let reais = parseInt(valorAtual) / 100;
    document.getElementById('display').textContent = 'R$ ' + reais.toFixed(2).replace('.', ',');
}

function adicionarPreco() {
    if (!valorAtual) return;
    let preco = parseInt(valorAtual) / 100;
    total += preco;
    itens++;
    atualizarTotal();
    valorAtual = '';
    atualizarDisplay();
}

function atualizarTotal() {
    document.getElementById('total').textContent =
        'TOTAL: R$ ' + total.toFixed(2).replace('.', ',');
    document.getElementById('count').textContent = itens;
}

function limparTudo() {
    if (itens > 0 && !confirm('Limpar tudo?')) return;
    valorAtual = '';
    total = 0;
    itens = 0;
    atualizarDisplay();
    atualizarTotal();
}
</script>

</body>
</html>
